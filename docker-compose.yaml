services:
  # ---------------------------------------------------------------------------
  # Ollama service for LLM and embedding models
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  # ---------------------------------------------------------------------------
  # Model initialization service (runs once to pull models)
  # ---------------------------------------------------------------------------
  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama service..."
        sleep 5
        echo "Pulling smollm2:135m model..."
        ollama pull smollm2:135m
        echo "Pulling nomic-embed-text model..."
        ollama pull nomic-embed-text
        echo "Models successfully pulled!"
    networks:
      - app_network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Phoenix observability platform
  # ---------------------------------------------------------------------------
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: phoenix
    ports:
      - "6006:6006"   # Phoenix UI and OTLP HTTP
      - "4318:4317"   # OTLP gRPC
    environment:
      - PHOENIX_HOST=0.0.0.0
      - PHOENIX_PORT=6006
    volumes:
      - phoenix_data:/phoenix
    networks:
      - app_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis cache / session store
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - app_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Customer service application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customer-service-app
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=smollm2:135m
      - EMBEDDING_MODEL=nomic-embed-text
      - PHOENIX_ENDPOINT=http://phoenix:6006
      - PHOENIX_ENABLED=true
      # Production hardening env vars
      - METRICS_ENABLED=true
      - LOG_LEVEL=INFO
      - APP_ENV=production
      - RATE_LIMIT_PER_MINUTE=20
      - LLM_TIMEOUT_SECONDS=30
      # API_KEY is intentionally unset here — set it via a .env file or secret
      # manager in production:  API_KEY=<strong-random-secret>
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
      phoenix:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - app_network
    profiles:
      - full   # Start with: docker compose --profile full up
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # nginx reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      # Uncomment when TLS is configured:
      # - "443:443"
    depends_on:
      - app
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Uncomment for Let's Encrypt certificates:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - app_network
    profiles:
      - full
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus metrics collection
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    depends_on:
      - app
    networks:
      - app_network
    profiles:
      - full
    restart: unless-stopped

volumes:
  ollama_data:
    driver: local
  phoenix_data:
    driver: local
  prometheus_data:
    driver: local
  redis_data:
    driver: local

networks:
  app_network:
    driver: bridge
