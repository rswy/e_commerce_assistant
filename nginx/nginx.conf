# nginx.conf — Production reverse proxy for Customer Service AI
#
# Features:
#   - Rate limiting (mirrors app-level rate limiting as first line of defense)
#   - Gzip compression
#   - Security headers
#   - Metrics endpoint blocked from external access
#   - TLS termination placeholder (see SSL section below)
#   - JSON access log format

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------------------------------------------------------------------------
    # JSON access log format
    # -------------------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes_sent":$bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # -------------------------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------------------------
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/x-javascript;

    # -------------------------------------------------------------------------
    # Rate limiting zone — 20 requests per minute per IP
    # 10 MB shared memory stores ~80 000 IP states.
    # -------------------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m rate=20r/m;
    limit_req_status 429;

    # -------------------------------------------------------------------------
    # Upstream — FastAPI application
    # -------------------------------------------------------------------------
    upstream app_backend {
        server app:8000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP server
    # In production, enable the redirect and the HTTPS block below instead.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # TLS redirect — uncomment in production and enable the HTTPS block:
        # return 301 https://$host$request_uri;

        # ---- Security headers -----------------------------------------------
        add_header X-Frame-Options            "SAMEORIGIN"           always;
        add_header X-Content-Type-Options     "nosniff"              always;
        add_header X-XSS-Protection           "1; mode=block"        always;
        add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy    "default-src 'self'"   always;
        add_header Referrer-Policy            "no-referrer-when-downgrade" always;

        # ---- Block external access to /metrics (Prometheus internal only) ---
        location /metrics {
            # Allow only the Docker internal network (172.0.0.0/8 covers Docker bridge).
            # Adjust to match your network CIDR if necessary.
            allow 172.0.0.0/8;
            allow 127.0.0.1;
            deny  all;

            proxy_pass         http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ---- Health check — no rate limiting --------------------------------
        location /health {
            proxy_pass         http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 10s;
        }

        # ---- All other API endpoints — rate limited -------------------------
        location / {
            limit_req zone=api burst=10 nodelay;

            proxy_pass         http://app_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Return 503 if upstream is unreachable
            proxy_next_upstream error timeout http_503;
        }
    }

    # -------------------------------------------------------------------------
    # HTTPS server (TLS termination)
    #
    # Steps to enable:
    #   1. Obtain a certificate:
    #        certbot certonly --webroot -w /var/www/certbot -d yourdomain.com
    #   2. Fill in the paths below.
    #   3. Uncomment this entire server block.
    #   4. Switch the HTTP block above to redirect: return 301 https://$host$request_uri;
    # -------------------------------------------------------------------------
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 1d;
    #     ssl_stapling        on;
    #     ssl_stapling_verify on;
    #
    #     add_header X-Frame-Options           "SAMEORIGIN"           always;
    #     add_header X-Content-Type-Options    "nosniff"              always;
    #     add_header X-XSS-Protection          "1; mode=block"        always;
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #     add_header Content-Security-Policy   "default-src 'self'"   always;
    #
    #     location /metrics {
    #         allow 172.0.0.0/8;
    #         allow 127.0.0.1;
    #         deny  all;
    #         proxy_pass http://app_backend;
    #     }
    #
    #     location /health {
    #         proxy_pass http://app_backend;
    #         proxy_read_timeout 10s;
    #     }
    #
    #     location / {
    #         limit_req zone=api burst=10 nodelay;
    #         proxy_pass         http://app_backend;
    #         proxy_http_version 1.1;
    #         proxy_set_header   Connection        "";
    #         proxy_set_header   Host              $host;
    #         proxy_set_header   X-Real-IP         $remote_addr;
    #         proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    #         proxy_set_header   X-Forwarded-Proto $scheme;
    #         proxy_connect_timeout 5s;
    #         proxy_send_timeout    60s;
    #         proxy_read_timeout    60s;
    #     }
    # }
}
